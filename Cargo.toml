[package]
name = "loserpoint"
version = "0.1.0"
edition = "2024"

[dependencies]
async-trait = "0.1.88"
dotenvy = "0.15.7"
futures = "0.3.31"
reqwest = { version = "0.12.20", features = ["json"]}
serde_json = "1.0.140"
sqlx = { version = "0.8.6", features = [ "runtime-tokio", "tls-native-tls", "postgres", "macros", "json"] }
tokio = { version = "1.45.1",  features = ["full"]}
