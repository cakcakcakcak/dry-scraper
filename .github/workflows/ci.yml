name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Cache cargo registry & git index
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            dry-scraper/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('dry-scraper/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Add components (rustfmt, clippy)
        run: rustup component add rustfmt clippy

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy --all-targets

      - name: Build (release)
        run: cargo build --release

      - name: Run tests
        run: cargo test --workspace --all-features --color=always
